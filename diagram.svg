<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- 135° line (upper-left, 45° angle) -->
  <line x1="50" y1="10" x2="90" y2="50" stroke="black" stroke-width="1"/>
  <!-- 45° line (upper-right, 45° angle) -->
  <line x1="130" y1="10" x2="90" y2="50" stroke="black" stroke-width="1"/>
  <!-- 0° arrow (straight right) -->
  <line x1="90" y1="50" x2="180" y2="50" stroke="black" stroke-width="1"/>
  <polygon points="180,50 172,46 172,54" fill="black"/>
</svg>
